name: Deploy

on:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  theme-check:
    name: Pre-Deploy Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install theme-check
        run: gem install theme-check

      - name: Run theme check
        run: |
          cd shopify/theme
          theme-check --fail-level error

  deploy-staging:
    name: Deploy to Staging
    needs: theme-check
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme to staging
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_STAGING_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STAGING_STORE_URL }}
        run: |
          shopify theme push --path shopify/theme --unpublished

  deploy-production:
    name: Deploy to Production
    needs: theme-check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme to production
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_PRODUCTION_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_PRODUCTION_STORE_URL }}
        run: |
          shopify theme push --path shopify/theme
