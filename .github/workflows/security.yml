name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  sensitive-file-guard:
    name: Sensitive File Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive files
        run: |
          FOUND=0
          for pattern in ".env" "*.key" "*.pem" "*.p12" "credentials.json" "service-account*.json"; do
            if find . -name "$pattern" -not -path "./.git/*" -not -name ".env.example" | grep -q .; then
              echo "BLOCKED: Found sensitive file matching pattern: $pattern"
              find . -name "$pattern" -not -path "./.git/*" -not -name ".env.example"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Sensitive files detected. Remove them before merging."
            exit 1
          fi
          echo "No sensitive files found."

  python-security:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          if [ -f moderation/ai_screener/requirements.txt ]; then
            pip-audit -r moderation/ai_screener/requirements.txt --desc
          else
            echo "No Python requirements found — skipping."
          fi

  theme-lint:
    name: Shopify Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install theme-check
        run: gem install theme-check

      - name: Run theme check
        run: |
          cd shopify/theme
          theme-check --fail-level error

  accessibility-lint:
    name: Accessibility Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Liquid templates for accessibility
        run: |
          EXIT_CODE=0

          echo "=== Checking for images missing alt attributes ==="
          for file in $(find shopify/theme -name "*.liquid" 2>/dev/null); do
            if grep -n '<img ' "$file" | grep -v 'alt=' | grep -q .; then
              echo "WARNING: Missing alt attribute in $file:"
              grep -n '<img ' "$file" | grep -v 'alt='
            fi
          done

          echo ""
          echo "=== Checking for aria-hidden on decorative elements ==="
          for file in $(find shopify/theme -name "*.liquid" 2>/dev/null); do
            if grep -n '<canvas' "$file" | grep -v 'aria-hidden' | grep -q .; then
              echo "WARNING: Canvas missing aria-hidden in $file:"
              grep -n '<canvas' "$file" | grep -v 'aria-hidden'
            fi
          done

          echo ""
          echo "=== Checking for skip-to-content link ==="
          if ! grep -r 'skip-to-content' shopify/theme/layout/ > /dev/null 2>&1; then
            echo "ERROR: No skip-to-content link found in layout."
            EXIT_CODE=1
          else
            echo "OK: skip-to-content link found."
          fi

          echo ""
          echo "=== Checking external links for rel=noopener ==="
          for file in $(find shopify/theme -name "*.liquid" 2>/dev/null); do
            if grep -n 'target="_blank"' "$file" | grep -v 'noopener' | grep -q .; then
              echo "WARNING: External link missing rel=noopener in $file:"
              grep -n 'target="_blank"' "$file" | grep -v 'noopener'
            fi
          done

          echo ""
          echo "Accessibility lint complete."
          exit $EXIT_CODE

  csp-check:
    name: CSP Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for inline event handlers
        run: |
          EXIT_CODE=0
          echo "=== Checking for inline event handlers (CSP violation) ==="
          for file in $(find shopify/theme -name "*.liquid" 2>/dev/null); do
            if grep -nE 'on(click|load|error|submit|change|focus|blur|mouseover|mouseout|keydown|keyup)=' "$file" | grep -q .; then
              echo "ERROR: Inline event handler found in $file (CSP violation):"
              grep -nE 'on(click|load|error|submit|change|focus|blur|mouseover|mouseout|keydown|keyup)=' "$file"
              EXIT_CODE=1
            fi
          done
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "OK: No inline event handlers found."
          fi
          exit $EXIT_CODE
