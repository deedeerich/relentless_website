name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

  sensitive-file-guard:
    name: Sensitive File Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive files
        run: |
          FOUND=0
          for pattern in ".env" "*.key" "*.pem" "*.p12" "credentials.json"; do
            if find . -name "$pattern" -not -path "./.git/*" -not -name ".env.example" | grep -q .; then
              echo "BLOCKED: Found sensitive file matching pattern: $pattern"
              find . -name "$pattern" -not -path "./.git/*" -not -name ".env.example"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Sensitive files detected. Remove them before merging."
            exit 1
          fi
          echo "No sensitive files found."

  accessibility-lint:
    name: Accessibility Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Liquid templates for alt text
        run: |
          MISSING_ALT=0
          for file in $(find shopify/theme -name "*.liquid" 2>/dev/null); do
            if grep -n '<img ' "$file" | grep -v 'alt=' | grep -q .; then
              echo "WARNING: Missing alt attribute in $file:"
              grep -n '<img ' "$file" | grep -v 'alt='
              MISSING_ALT=1
            fi
          done
          if [ "$MISSING_ALT" -eq 1 ]; then
            echo "::warning::Images missing alt attributes detected. WCAG 2.1 AA requires alt text on all images."
          fi
          echo "Accessibility lint complete."
